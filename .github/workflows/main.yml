name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository AND submodules
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive      # ✅ ensures submodules are fetched
          fetch-depth: 0             # ✅ fetch full history
          token: ${{ secrets.GITHUB_TOKEN }}  # ✅ access for private submodules

      # Setup Node.js 24
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Run build
      - name: Build
        run: npm run build

      # Run tests
      - name: Test
        run: npm test