<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pioneer Test - focusChrist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: Georgia, serif; min-height: 100vh; }
        
        /* NAVIGATION - Same as about page */
        nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); border-bottom: 1px solid rgba(201,169,97,0.3); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #c9a961; text-decoration: none; font-size: 0.9em; }
        .nav-links a:hover { color: #c9a961; }
        
        /* Hamburger Menu - Same as about page */
        .hamburger-wrap { position: relative; }
        .hamburger { cursor: pointer; font-size: 1.5em; color: #c9a961; line-height: 1; padding: 10px; margin: -10px; }
        .hamburger::before { content: ""; display: block; width: 20px; height: 2px; background: #c9a961; margin: 5px 0; box-shadow: 0 -6px 0 #c9a961, 0 6px 0 #c9a961; }
        .hamburger-menu { display: none; position: absolute; top: 100%; right: 0; background: #111; border: 1px solid #c9a961; border-radius: 5px; padding: 10px; min-width: 150px; }
        .hamburger-menu.show { display: block; }
        .hamburger-menu a { display: block; color: #c9a961; padding: 8px 15px; text-decoration: none; border-bottom: 1px solid rgba(201,169,97,0.2); }
        .hamburger-menu a:hover { background: rgba(201,169,97,0.1); }
        .hamburger { display: none; }
        
        /* Hero/Pioneer Art Image */
        .hero { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 80px 20px 20px; }
        .hero img { max-width: 100%; height: auto; border: 2px solid #c9a961; border-radius: 10px; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hamburger-wrap { display: block; }
            .hamburger { display: block; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="ask.html">ASK</a>
            <a href="art.html">ART</a>
            <a href="pioneers.html">PIONEERS</a>
            <a href="about.html">ABOUT</a>
        </div>
        <div class="hamburger-wrap">
            <span class="hamburger" onclick="toggleMenu()"></span>
            <div class="hamburger-menu" id="hamburgerMenu">
                <a href="index.html">HOME</a>
                <a href="ask.html">ASK</a>
                <a href="pioneers.html">PIONEERS</a>
                <a href="about.html">ABOUT</a>
                <a href="art.html">ART</a>
            </div>
        </div>
    </nav>

    <!-- Pioneer Art Image -->
    <div class="hero">
        <img src="pioneer art.png" alt="Pioneer Art">
    </div>

    <script>
        function toggleMenu() {
            var menu = document.getElementById('hamburgerMenu');
            menu.classList.toggle('show');
        }
    </script>
</body>
</html>
